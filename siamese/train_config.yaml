seed: 42
device: auto

annotations_path: data/train/annotations/annotations.json
samples_dir: data/train/samples
crop_cache_dir: preprocessed_data/siamese/crops
manifest_path: preprocessed_data/siamese/manifest.json
checkpoint_dir: result/siamese

backbone: resnet18
pretrained_backbone: true
freeze_backbone: false
embedding_dim: 128
dropout: 0.2
image_size: 224

epochs: 45
early_stopping_patience: 8
early_stopping_min_delta: 0.0
checkpoint_metric: val_f1_opt
batch_size: 48
num_workers: 0
lr: 0.00003
weight_decay: 0.0005
loss: triplet_bce
margin: 0.4
similarity_threshold: 0.65
auto_similarity_threshold: true
triplet_weight: 1.0
pair_bce_weight: 0.35
pair_bce_scale: 16.0

train_ratio: 0.8
split_strategy: stratified
loco_fold_index: 0
positive_ratio: 0.5
hard_negative_ratio: 0.6
train_pairs: 24000
val_pairs: 6000

max_crops_per_track: 48
min_crop_size: 16
force_rebuild_cache: false
